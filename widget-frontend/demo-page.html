<!doctype html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CloudComment Demo Page</title>
    <style>
      :root,
      :root[data-theme="light"] {
        --demo-bg: #eef4f7;
        --demo-surface: #ffffff;
        --demo-border: #d5dce8;
        --demo-text: #536078;
        --demo-heading: #101828;
        --demo-code-bg: #eef4ff;
        --demo-code-text: #194185;
        --demo-accent: #0f766e;
        --demo-accent-strong: #0d5f59;
        --demo-accent-contrast: #ffffff;
        --demo-shadow: 0 18px 48px rgba(21, 31, 53, 0.08);
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        --demo-bg: #0d1624;
        --demo-surface: #172234;
        --demo-border: #304158;
        --demo-text: #aab7c8;
        --demo-heading: #f5f8fc;
        --demo-code-bg: #101a2b;
        --demo-code-text: #93c5fd;
        --demo-accent: #5eead4;
        --demo-accent-strong: #2dd4bf;
        --demo-accent-contrast: #06221f;
        --demo-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background: var(--demo-bg);
        color: var(--demo-text);
        font-family:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        transition:
          background 180ms ease,
          color 180ms ease;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 40px auto 72px;
      }

      article {
        margin-bottom: 24px;
        border: 1px solid var(--demo-border);
        border-radius: 8px;
        background: var(--demo-surface);
        padding: clamp(22px, 4vw, 38px);
        box-shadow: var(--demo-shadow);
        transition:
          background 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      .topline {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        color: var(--demo-heading);
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        max-width: 760px;
        margin: 14px 0 0;
        color: var(--demo-text);
        font-size: 1rem;
        line-height: 1.65;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--demo-heading);
        font-weight: 800;
      }

      input {
        width: min(560px, 100%);
        border: 1px solid var(--demo-border);
        border-radius: 8px;
        background: var(--demo-surface);
        color: var(--demo-heading);
        font: inherit;
        padding: 11px 12px;
        outline: 0;
      }

      input:focus {
        border-color: var(--demo-accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--demo-accent) 18%, transparent);
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--demo-accent);
        color: var(--demo-accent-contrast);
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 11px 16px;
        transition:
          transform 150ms ease,
          box-shadow 150ms ease,
          background 150ms ease;
        box-shadow: 0 10px 22px rgba(15, 118, 110, 0.22);
      }

      button:hover {
        background: var(--demo-accent-strong);
        transform: translateY(-1px);
        box-shadow: 0 14px 28px rgba(15, 118, 110, 0.28);
      }

      .theme-toggle {
        flex: 0 0 auto;
        border: 1px solid var(--demo-border);
        background: var(--demo-surface);
        color: var(--demo-heading);
        box-shadow: none;
      }

      .theme-toggle:hover {
        background: var(--demo-surface);
        color: var(--demo-heading);
        box-shadow: var(--demo-shadow);
      }

      code {
        border-radius: 6px;
        background: var(--demo-code-bg);
        color: var(--demo-code-text);
        padding: 2px 6px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: end;
        margin-top: 22px;
      }

      #comments {
        width: 100%;
      }

      @media (max-width: 640px) {
        .desktop-hint {
          display: none;
        }

        .topline {
          flex-direction: column;
        }

        button,
        input {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        <div class="topline">
          <div>
            <h1>Внешняя страница сайта</h1>
            <p>
              Это отдельный origin <code>http://127.0.0.1:4173</code>. Здесь подключается реальный CloudComment widget bundle через Caddy.
            </p>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button">Тёмная тема</button>
        </div>
        <div class="row">
          <div>
            <label for="siteId">Site ID</label>
            <input id="siteId" autocomplete="off" placeholder="UUID сайта из админки" />
          </div>
          <button id="loadWidget" type="button">Загрузить виджет</button>
        </div>
        <p class="desktop-hint">Можно открыть сразу так: <code>/demo-page.html?siteId=&lt;uuid&gt;</code></p>
      </article>

      <div id="comments"></div>
    </main>

    <script src="http://localhost/widget/cloud-comment-widget.js"></script>
    <script>
      const input = document.querySelector("#siteId");
      const button = document.querySelector("#loadWidget");
      const themeToggle = document.querySelector("#themeToggle");
      const params = new URLSearchParams(window.location.search);
      const initialSiteId = params.get("siteId") || "";
      const storedTheme = window.localStorage.getItem("cloud-comment.demo.theme");
      const initialTheme = storedTheme === "dark" || storedTheme === "light"
        ? storedTheme
        : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

      input.value = initialSiteId;
      setDemoTheme(initialTheme);

      function setDemoTheme(theme) {
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        window.localStorage.setItem("cloud-comment.demo.theme", theme);
        themeToggle.textContent = theme === "dark" ? "Светлая тема" : "Тёмная тема";
      }

      function initWidget() {
        const siteId = input.value.trim();
        if (!siteId) {
          alert("Вставьте siteId из админки");
          return;
        }
        window.history.replaceState(null, "", `${window.location.pathname}?siteId=${encodeURIComponent(siteId)}`);
        window.CloudCommentWidget.init({
          siteId,
          apiBaseUrl: "http://localhost/api",
          pageUrl: `${window.location.origin}${window.location.pathname}`,
          target: "#comments",
          theme: "auto"
        });
      }

      themeToggle.addEventListener("click", () => {
        setDemoTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
      });

      button.addEventListener("click", initWidget);
      if (initialSiteId) initWidget();
    </script>
  </body>
</html>
