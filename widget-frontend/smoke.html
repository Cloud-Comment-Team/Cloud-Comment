<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CloudComment Widget Smoke</title>
    <style>
      body {
        margin: 0;
        background: #f6f8fb;
        color: #182230;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 48px auto;
      }

      article {
        margin-bottom: 28px;
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        <h1>External page smoke test</h1>
        <p>This page loads the built widget bundle as an external site would.</p>
      </article>

      <div id="comments"></div>
    </main>

    <script src="./dist/widget/cloud-comment-widget.js"></script>
    <script>
      window.CloudCommentWidget.init({
        siteId: "00000000-0000-0000-0000-000000000000",
        apiBaseUrl: "http://localhost/api",
        pageUrl: window.location.href,
        target: "#comments"
      });
    </script>
  </body>
</html>
