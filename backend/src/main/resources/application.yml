spring:
  application:
    name: cloud-comment
  profiles:
    default: local
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:3}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
  web:
    resources:
      add-mappings: false

cloud-comment:
  embed:
    script-url: ${CLOUD_COMMENT_WIDGET_SCRIPT_URL:http://localhost/widget/cloud-comment-widget.js}
    api-base-url: ${CLOUD_COMMENT_PUBLIC_API_BASE_URL:http://localhost/api}
  mail:
    mode: ${CLOUD_COMMENT_MAIL_MODE:log}
    from: ${CLOUD_COMMENT_MAIL_FROM:noreply@cloud-comment.local}
    confirmation-base-url: ${CLOUD_COMMENT_ACCOUNT_DELETION_CONFIRM_URL:http://localhost/account/deletion-confirm}
    smtp:
      host: ${CLOUD_COMMENT_MAIL_SMTP_HOST:}
      port: ${CLOUD_COMMENT_MAIL_SMTP_PORT:587}
      username: ${CLOUD_COMMENT_MAIL_SMTP_USERNAME:}
      password: ${CLOUD_COMMENT_MAIL_SMTP_PASSWORD:}
      starttls: ${CLOUD_COMMENT_MAIL_SMTP_STARTTLS:true}
  privacy:
    privacy-policy-version: ${CLOUD_COMMENT_PRIVACY_POLICY_VERSION:2026-07-01}
    terms-version: ${CLOUD_COMMENT_TERMS_VERSION:2026-07-01}
    privacy-policy-url: ${CLOUD_COMMENT_PRIVACY_POLICY_URL:/legal/privacy-policy.html}
    terms-url: ${CLOUD_COMMENT_TERMS_URL:/legal/terms.html}
    personal-data-notice-url: ${CLOUD_COMMENT_PERSONAL_DATA_NOTICE_URL:/legal/personal-data-notice.html}
    data-export-info-url: ${CLOUD_COMMENT_DATA_EXPORT_INFO_URL:/legal/personal-data-notice.html#data-export}
    session-retention-days: ${CLOUD_COMMENT_SESSION_RETENTION_DAYS:30}
    deletion-request-retention-days: ${CLOUD_COMMENT_DELETION_REQUEST_RETENTION_DAYS:30}
    retention-cleanup-cron: ${CLOUD_COMMENT_RETENTION_CLEANUP_CRON:0 0 3 * * *}
  notifications:
    retention-cleanup-cron: ${CLOUD_COMMENT_NOTIFICATION_RETENTION_CLEANUP_CRON:0 30 3 * * *}
  installation-health:
    retention-cleanup-cron: ${CLOUD_COMMENT_INSTALLATION_HEALTH_CLEANUP_CRON:0 45 3 * * *}
  demo:
    seed:
      enabled: ${CLOUD_COMMENT_DEMO_SEED_ENABLED:false}
      owner-email: ${CLOUD_COMMENT_DEMO_OWNER_EMAIL:demo-owner@cloudcomment.local}
      owner-password: ${CLOUD_COMMENT_DEMO_OWNER_PASSWORD:CloudCommentDemo!2026}
      site-id: ${CLOUD_COMMENT_DEMO_SITE_ID:c680d246-8876-4049-975c-73ccf029408f}
      allowed-origins: ${CLOUD_COMMENT_DEMO_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1,http://127.0.0.1:4173}
      page-url: ${CLOUD_COMMENT_DEMO_PAGE_URL:http://localhost/demo-page.html}

server:
  port: ${SERVER_PORT:8080}
