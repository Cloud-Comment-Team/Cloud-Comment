spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

cloud-comment:
  auth:
    admin-session:
      cookie-name: ${CLOUD_COMMENT_ADMIN_SESSION_COOKIE_NAME:__Host-cloud_comment_admin_session}
      csrf-cookie-name: ${CLOUD_COMMENT_ADMIN_CSRF_COOKIE_NAME:__Host-cloud_comment_admin_csrf}
      secure: ${CLOUD_COMMENT_ADMIN_COOKIE_SECURE:true}
