services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloud_comment}
      POSTGRES_USER: ${POSTGRES_USER:-cloud_comment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloud_comment}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloud_comment} -d ${POSTGRES_DB:-cloud_comment}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    image: cloud-comment-backend:local
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cloud_comment}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-cloud_comment}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-cloud_comment}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./fronted/dist:/srv/fronted:ro

volumes:
  postgres_data:
