name: CD

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    env:
      DEPLOY_HOST: ${{ vars.CLOUD_COMMENT_DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.CLOUD_COMMENT_DEPLOY_PORT }}
      DEPLOY_USER: ${{ vars.CLOUD_COMMENT_DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.CLOUD_COMMENT_DEPLOY_PATH }}
      PUBLIC_BASE_URL: ${{ vars.CLOUD_COMMENT_PUBLIC_BASE_URL }}
      WIDGET_BASE_URL: ${{ vars.CLOUD_COMMENT_WIDGET_BASE_URL }}
      EDGE_PROXY_CIDRS: ${{ vars.CLOUD_COMMENT_CADDY_TRUSTED_PROXIES }}
      DEPLOY_SSH_KEY: ${{ secrets.CLOUD_COMMENT_DEPLOY_SSH_KEY }}
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      RELEASE_ID: ${{ github.event.workflow_run.head_sha || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deploy configuration
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$PUBLIC_BASE_URL"
          test -n "$WIDGET_BASE_URL"
          test -n "$EDGE_PROXY_CIDRS"
          test -n "$DEPLOY_SSH_KEY"
          [[ "$RELEASE_ID" =~ ^[0-9a-f]{40}-[0-9]+-[0-9]+$ ]]
          [[ "$PUBLIC_BASE_URL" =~ ^https://[A-Za-z0-9.-]+(:[0-9]{1,5})?$ ]]
          [[ "$WIDGET_BASE_URL" =~ ^https://[A-Za-z0-9.-]+(:[0-9]{1,5})?$ ]]
          test "$WIDGET_BASE_URL" != "$PUBLIC_BASE_URL"
          for cidr in $EDGE_PROXY_CIDRS; do
            [[ "$cidr" =~ ^[0-9A-Fa-f:.]+/[0-9]{1,3}$ ]]
          done

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build backend jar
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar --no-daemon

      - name: Set up Node for admin
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Build admin
        working-directory: frontend/admin
        env:
          VITE_CLOUD_COMMENT_API_BASE_URL: /api
        run: |
          npm ci
          npm run build

      - name: Set up Node for widget
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: widget-frontend/package-lock.json

      - name: Build widget
        working-directory: widget-frontend
        env:
          VITE_CLOUD_COMMENT_API_BASE_URL: ${{ env.PUBLIC_BASE_URL }}/api
          VITE_CLOUD_COMMENT_WIDGET_BASE_URL: ${{ env.WIDGET_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Prepare deploy package
        run: |
          rm -rf .deploy-package
          mkdir -p .deploy-package/backend .deploy-package/www/admin .deploy-package/www/widget
          jar_file="$(find backend/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*plain*' | head -n 1)"
          test -n "$jar_file"
          cp "$jar_file" .deploy-package/backend/app.jar
          cp -R frontend/admin/dist/. .deploy-package/www/admin/
          cp -R widget-frontend/dist/widget/. .deploy-package/www/widget/
          cp -R deploy .deploy-package/deploy
          printf 'RELEASE_SHA=%s\nRELEASE_ID=%s\nPUBLIC_BASE_URL=%s\nWIDGET_BASE_URL=%s\nEDGE_PROXY_CIDRS=%s\nWIDGET_PROTOCOL=%s\n' \
            "$RELEASE_SHA" "$RELEASE_ID" "$PUBLIC_BASE_URL" "$WIDGET_BASE_URL" "$EDGE_PROXY_CIDRS" "frame-v1" \
            > .deploy-package/release.env

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/cloud-comment-deploy
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/cloud-comment-deploy
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          incoming="$DEPLOY_PATH/releases/.incoming-$RELEASE_ID"
          release="$DEPLOY_PATH/releases/$RELEASE_ID"
          cleanup_incoming() {
            ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
              "rm -rf -- '$incoming'" || true
          }
          trap cleanup_incoming EXIT
          ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu; if ! command -v rsync >/dev/null 2>&1; then sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y rsync; fi; mkdir -p '$DEPLOY_PATH/releases' '$DEPLOY_PATH/shared'; test ! -e '$release'; rm -rf -- '$incoming'; mkdir -p '$incoming'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/cloud-comment-deploy -p $DEPLOY_PORT" \
            .deploy-package/ "$DEPLOY_USER@$DEPLOY_HOST:$incoming/"
          ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu; test ! -e '$release'; mv '$incoming' '$release'"
          trap - EXIT

      - name: Activate release atomically
        id: activate
        run: |
          ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu; previous=; if [ -L '$DEPLOY_PATH/current' ]; then previous=\$(readlink -f '$DEPLOY_PATH/current'); elif [ -d '$DEPLOY_PATH/current' ]; then previous='$DEPLOY_PATH/releases/legacy-'\$(date +%Y%m%d%H%M%S); mv '$DEPLOY_PATH/current' \"\$previous\"; fi; printf '%s\n' \"\$previous\" > '$DEPLOY_PATH/shared/previous-release'; ln -sfn '$DEPLOY_PATH/releases/$RELEASE_ID' '$DEPLOY_PATH/current.next'; mv -Tf '$DEPLOY_PATH/current.next' '$DEPLOY_PATH/current'"
          echo "activated=true" >> "$GITHUB_OUTPUT"

      - name: Apply server config and restart
        run: |
          ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo APP_DIR='$DEPLOY_PATH' APP_USER='$DEPLOY_USER' CLOUD_COMMENT_PUBLIC_BASE_URL='$PUBLIC_BASE_URL' CLOUD_COMMENT_WIDGET_BASE_URL='$WIDGET_BASE_URL' CLOUD_COMMENT_CADDY_TRUSTED_PROXIES='$EDGE_PROXY_CIDRS' bash '$DEPLOY_PATH/current/deploy/server/bootstrap.sh'"

      - name: Smoke check
        run: |
          ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu; test \"\$(readlink -f '$DEPLOY_PATH/current')\" = '$DEPLOY_PATH/releases/$RELEASE_ID'; sudo supervisorctl -c '$DEPLOY_PATH/shared/supervisord.conf' status cloud-comment-backend | grep -q RUNNING; sudo supervisorctl -c '$DEPLOY_PATH/shared/supervisord.conf' status cloud-comment-caddy | grep -q RUNNING"
          for _ in {1..30}; do
            main_healthy=false
            widget_healthy=false
            if curl -fsS "$PUBLIC_BASE_URL/api/health" >/dev/null \
              && curl -fsS "$PUBLIC_BASE_URL/widget/cloud-comment-widget.js" >/dev/null; then
              main_healthy=true
            fi
            if curl -fsS "$WIDGET_BASE_URL/widget/cloud-comment-widget.js" >/dev/null \
              && curl -fsS "$WIDGET_BASE_URL/widget/cloud-comment-widget-frame.js" >/dev/null \
              && curl -fsS "$WIDGET_BASE_URL/widget/cloud-comment-widget.css" >/dev/null; then
              widget_healthy=true
            fi
            if ! curl -fsS "$WIDGET_BASE_URL/api/health" >/dev/null; then
              widget_healthy=false
            fi
            widget_root_status="$(curl -sS -o /dev/null -w '%{http_code}' "$WIDGET_BASE_URL/")"
            if [ "$widget_root_status" != "404" ]; then
              widget_healthy=false
            fi
            widget_admin_status="$(curl -sS -o /dev/null -w '%{http_code}' "$WIDGET_BASE_URL/api/auth/csrf")"
            if [ "$widget_admin_status" != "404" ]; then
              widget_healthy=false
            fi
            if [ "$main_healthy" = true ] && [ "$widget_healthy" = true ]; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Roll back failed release and verify recovery
        if: ${{ failure() && steps.activate.outputs.activated == 'true' }}
        run: |
          previous="$(ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cat '$DEPLOY_PATH/shared/previous-release' 2>/dev/null || true")"
          test -n "$previous"
          ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "test -d '$previous'"

          previous_metadata="$(ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cat '$previous/release.env' 2>/dev/null || true")"
          previous_public_base="$PUBLIC_BASE_URL"
          previous_widget_base="$PUBLIC_BASE_URL"
          previous_edge_proxy_cidrs="$EDGE_PROXY_CIDRS"
          previous_protocol="legacy"
          if [ -n "$previous_metadata" ]; then
            previous_public_base="$(printf '%s\n' "$previous_metadata" | sed -n 's/^PUBLIC_BASE_URL=//p' | head -n 1)"
            previous_widget_base="$(printf '%s\n' "$previous_metadata" | sed -n 's/^WIDGET_BASE_URL=//p' | head -n 1)"
            previous_edge_proxy_cidrs="$(printf '%s\n' "$previous_metadata" | sed -n 's/^EDGE_PROXY_CIDRS=//p' | head -n 1)"
            previous_protocol="$(printf '%s\n' "$previous_metadata" | sed -n 's/^WIDGET_PROTOCOL=//p' | head -n 1)"
          fi
          [[ "$previous_public_base" =~ ^https://[A-Za-z0-9.-]+(:[0-9]{1,5})?$ ]]
          [[ "$previous_widget_base" =~ ^https://[A-Za-z0-9.-]+(:[0-9]{1,5})?$ ]]
          test -n "$previous_edge_proxy_cidrs"
          for cidr in $previous_edge_proxy_cidrs; do
            [[ "$cidr" =~ ^[0-9A-Fa-f:.]+/[0-9]{1,3}$ ]]
          done

          ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu; ln -sfn '$previous' '$DEPLOY_PATH/current.next'; mv -Tf '$DEPLOY_PATH/current.next' '$DEPLOY_PATH/current'; sudo APP_DIR='$DEPLOY_PATH' APP_USER='$DEPLOY_USER' CLOUD_COMMENT_PUBLIC_BASE_URL='$previous_public_base' CLOUD_COMMENT_WIDGET_BASE_URL='$previous_widget_base' CLOUD_COMMENT_CADDY_TRUSTED_PROXIES='$previous_edge_proxy_cidrs' bash '$DEPLOY_PATH/current/deploy/server/bootstrap.sh'; test \"\$(readlink -f '$DEPLOY_PATH/current')\" = '$previous'; sudo supervisorctl -c '$DEPLOY_PATH/shared/supervisord.conf' status cloud-comment-backend | grep -q RUNNING; sudo supervisorctl -c '$DEPLOY_PATH/shared/supervisord.conf' status cloud-comment-caddy | grep -q RUNNING"

          for _ in {1..30}; do
            recovered=false
            if curl -fsS "$previous_public_base/api/health" >/dev/null; then
              if [ "$previous_protocol" = "frame-v1" ]; then
                if curl -fsS "$previous_public_base/widget/cloud-comment-widget.js" >/dev/null \
                  && curl -fsS "$previous_widget_base/api/health" >/dev/null \
                  && curl -fsS "$previous_widget_base/widget/cloud-comment-widget.js" >/dev/null \
                  && curl -fsS "$previous_widget_base/widget/cloud-comment-widget-frame.js" >/dev/null \
                  && curl -fsS "$previous_widget_base/widget/cloud-comment-widget.css" >/dev/null; then
                  widget_root_status="$(curl -sS -o /dev/null -w '%{http_code}' "$previous_widget_base/")"
                  widget_admin_status="$(curl -sS -o /dev/null -w '%{http_code}' "$previous_widget_base/api/auth/csrf")"
                  if [ "$widget_root_status" = "404" ] && [ "$widget_admin_status" = "404" ]; then
                    recovered=true
                  fi
                fi
              elif curl -fsS "$previous_public_base/widget/cloud-comment-widget.js" >/dev/null; then
                recovered=true
              fi
            fi
            if [ "$recovered" = true ]; then
              echo "Previous release recovered successfully: $previous"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Rollback completed, but the previous release did not recover" >&2
          exit 1

      - name: Keep three latest releases
        if: success()
        run: |
          ssh -i ~/.ssh/cloud-comment-deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu; cd '$DEPLOY_PATH/releases'; release_root=\$(readlink -f .); current=\$(readlink -f '$DEPLOY_PATH/current'); previous=\$(cat '$DEPLOY_PATH/shared/previous-release' 2>/dev/null || true); count=0; for release in \$(ls -1dt -- */ 2>/dev/null || true); do count=\$((count + 1)); if [ \$count -le 3 ] || [ -L \"\$release\" ]; then continue; fi; candidate=\$(readlink -f -- \"\$release\"); case \"\$candidate\" in \"\$release_root\"/*) ;; *) echo \"Refusing to delete release outside \$release_root: \$candidate\" >&2; exit 1 ;; esac; if [ \"\$candidate\" != \"\$current\" ] && [ \"\$candidate\" != \"\$previous\" ]; then rm -rf -- \"\$candidate\"; fi; done"
