<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Предварительный просмотр CloudComment</title>
    <style>
      html { color-scheme: light; background: #f8fafc; }
      body { margin: 0; padding: 24px; font-family: system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <div id="cloud-comment-preview"></div>
    <script>
      (() => {
        let style = null;
        let instance = null;
        const siteId = '00000000-0000-0000-0000-000000000001';
        const unsupported = async () => { throw new Error('Недоступно в предварительном просмотре.'); };
        function createPreviewApi() {
          const now = new Date().toISOString();
          const comment = {
            id: '00000000-0000-0000-0000-000000000002',
            siteId,
            pageId: '00000000-0000-0000-0000-000000000003',
            parentId: null,
            author: { id: '00000000-0000-0000-0000-000000000004', displayName: 'Анна' },
            content: 'Так выглядит комментарий с выбранным оформлением.',
            status: 'APPROVED',
            createdAt: now,
            updatedAt: now,
            editedAt: null,
            pinned: true,
            ownedByCurrentUser: false,
            reactions: ['LIKE', 'LOVE', 'LAUGH', 'WOW'].map((type, index) => ({
              type,
              emoji: ['👍', '❤️', '😄', '😮'][index],
              label: ['Нравится', 'Любовь', 'Смешно', 'Удивление'][index],
              count: [4, 2, 1, 0][index],
              reactedByCurrentUser: false
            })),
            replyCount: 0,
            replies: []
          };
          return {
            getConfig: async () => ({ siteId, moderationMode: 'POST_MODERATION', style }),
            getConsentRequirements: async () => ({
              privacyPolicyVersion: 'preview',
              termsVersion: 'preview',
              privacyPolicyUrl: '#',
              termsUrl: '#',
              personalDataNoticeUrl: '#',
              dataExportInfoUrl: '#'
            }),
            listComments: async () => ({ items: [comment], page: 1, pageSize: 20, totalItems: 1, totalPages: 1 }),
            listReplies: async () => ({ items: [], page: 1, pageSize: 20, totalItems: 0, totalPages: 0 }),
            createComment: unsupported,
            updateComment: unsupported,
            deleteComment: unsupported,
            setReaction: unsupported,
            getCurrentUser: unsupported,
            login: unsupported,
            register: unsupported,
            logout: unsupported
          };
        }
        function render() {
          if (!style || !window.CloudCommentWidgetFrame) return;
          instance?.destroy();
          document.getElementById('cloud-comment-preview').replaceChildren();
          instance = window.CloudCommentWidgetFrame.previewInit(createPreviewApi());
        }
        window.addEventListener('message', (event) => {
          if (event.source !== parent || event.origin !== window.location.origin || event.data?.type !== 'cloud-comment-preview') return;
          style = event.data.style;
          render();
        });
        const script = document.createElement('script');
        script.src = '/widget/cloud-comment-widget-frame.js';
        script.addEventListener('load', render);
        document.head.append(script);
      })();
    </script>
  </body>
</html>
